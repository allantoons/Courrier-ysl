<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Courrier YSL" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Courrier YSL</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --black: #0a0a0a; --white: #f5f0eb; --gold: #c9a84c; --gold-light: #e8c97a;
      --red: #c0392b; --green: #27ae60; --grey: #1e1e1e; --grey2: #2c2c2c;
      --grey3: #444; --text-muted: #888; --radius: 12px; --tab-h: 72px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; min-height: -webkit-fill-available; overflow-x: hidden; }

    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--black); border-bottom: 1px solid var(--grey2); padding: env(safe-area-inset-top, 20px) 20px 14px; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--gold); }
    .header-subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .header-date { font-size: 12px; color: var(--text-muted); text-align: right; }

    .content { padding-top: calc(env(safe-area-inset-top, 20px) + 70px); padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom, 10px) + 10px); }
    .tab { display: none; padding: 20px 16px; }
    .tab.active { display: block; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--grey); border-top: 1px solid var(--grey2); display: flex; padding-bottom: env(safe-area-inset-bottom, 10px); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; gap: 4px; cursor: pointer; border: none; background: none; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.5px; transition: color 0.2s; }
    .nav-btn.active { color: var(--gold); }
    .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }

    .card { background: var(--grey); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--grey2); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-meta { font-size: 12px; color: var(--text-muted); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-recu    { background: rgba(201,168,76,.15); color: var(--gold);  border: 1px solid rgba(201,168,76,.3); }
    .badge-notifie { background: rgba(39,174,96,.15);  color: var(--green); border: 1px solid rgba(39,174,96,.3); }
    .badge-remis   { background: rgba(100,100,100,.2); color: #aaa;         border: 1px solid #444; }
    .badge-attente { background: rgba(192,57,43,.15);  color: #e74c3c;      border: 1px solid rgba(192,57,43,.3); }

    .carrier { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--grey2); }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .form-input, .form-select { width: 100%; background: var(--grey2); border: 1px solid var(--grey3); border-radius: 10px; padding: 13px 15px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; appearance: none; -webkit-appearance: none; transition: border-color .2s; }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--grey3); }

    .autocomplete-wrap { position: relative; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: var(--grey2); border: 1px solid var(--gold); border-top: none; border-radius: 0 0 10px 10px; z-index: 50; max-height: 200px; overflow-y: auto; display: none; }
    .autocomplete-list.open { display: block; }
    .autocomplete-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--grey3); transition: background .15s; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:active { background: var(--grey3); }
    .ac-name { font-size: 14px; font-weight: 500; }
    .ac-dept { font-size: 12px; color: var(--text-muted); }

    .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; display: block; text-align: center; }
    .btn-primary { background: var(--gold); color: var(--black); }
    .btn-secondary { background: var(--grey2); color: var(--white); border: 1px solid var(--grey3); }
    .btn-notify { background: rgba(39,174,96,.15); color: var(--green); border: 1px solid rgba(39,174,96,.4); text-decoration: none; }
    .btn-danger { background: rgba(192,57,43,.15); color: #e74c3c; border: 1px solid rgba(192,57,43,.3); }
    .btn-sm { width: auto; padding: 10px 18px; font-size: 13px; border-radius: 8px; display: inline-block; }

    /* SCANNER */
    .scanner-box { background: var(--grey); border-radius: 16px; overflow: hidden; border: 1px solid var(--grey2); margin-bottom: 16px; }
    .scanner-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--grey2); }
    .scanner-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--grey3); flex-shrink: 0; }
    .scanner-dot.active { background: var(--green); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #reader { width: 100%; }
    #reader video { border-radius: 0 !important; }
    .scan-result { padding: 14px 16px; background: rgba(201,168,76,.08); border-top: 1px solid var(--grey2); display: none; }
    .scan-result.show { display: block; }
    .scan-result-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .scan-result-code { font-size: 15px; font-weight: 600; color: var(--gold); word-break: break-all; }

    /* Bandeau multi-colis inline */
    .scan-next-banner { display: none; background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.35); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .scan-next-banner.show { display: block; }
    .scan-next-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .scan-next-name { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .scan-next-btns { display: flex; gap: 10px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--grey); border-radius: var(--radius); padding: 16px; border: 1px solid var(--grey2); }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--gold); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input { width: 100%; background: var(--grey); border: 1px solid var(--grey2); border-radius: 10px; padding: 12px 15px 12px 40px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--text-muted); }

    .detail-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); display: none; align-items: flex-end; }
    .detail-overlay.open { display: flex; }
    .detail-panel { background: var(--grey); border-radius: 20px 20px 0 0; width: 100%; padding: 0 20px 40px; max-height: 85vh; overflow-y: auto; }
    .detail-handle { width: 40px; height: 4px; background: var(--grey3); border-radius: 2px; margin: 14px auto 20px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--grey2); }
    .detail-key { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .detail-val { font-size: 14px; font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--gold); margin-bottom: 16px; }
    .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }

    .toast { position: fixed; top: calc(env(safe-area-inset-top,20px) + 75px); left: 16px; right: 16px; z-index: 300; background: var(--green); color: #fff; padding: 14px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(-10px); transition: all .3s; pointer-events: none; }
    .toast.error { background: var(--red); }
    .toast.show { opacity: 1; transform: translateY(0); }

    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--grey3); background: var(--grey); color: var(--text-muted); cursor: pointer; }
    .chip.active { background: var(--gold); color: var(--black); border-color: var(--gold); }
    .divider { height: 1px; background: var(--grey2); margin: 16px 0; }
    .mt-10 { margin-top: 10px; }
    .mt-12 { margin-top: 12px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">SAINT LAURENT</div>
    <div class="header-subtitle">Service Courrier</div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="content">

  <!-- ACCUEIL -->
  <div class="tab active" id="tab-home">
    <div class="section-title">Tableau de bord</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-today">0</div><div class="stat-label">Colis aujourd'hui</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">En attente</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-notifie">0</div><div class="stat-label">Notifies</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-remis">0</div><div class="stat-label">Remis</div></div>
    </div>
    <div class="section-title">Colis recents</div>
    <div id="recent-list"></div>
  </div>

  <!-- NOUVEAU COLIS -->
  <div class="tab" id="tab-new">
    <div class="section-title">Nouveau colis</div>

    <div class="scanner-box">
      <div class="scanner-header">
        <div class="scanner-dot" id="scannerDot"></div>
        <span style="font-size:13px;color:var(--text-muted)">Scanner le code-barres</span>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button class="btn btn-secondary btn-sm" id="torchBtn" style="display:none;padding:8px 12px" title="Lampe torche">&#128294;</button>
          <button class="btn btn-secondary btn-sm" id="toggleScanBtn">Activer</button>
        </div>
      </div>
      <div id="reader"></div>
      <div class="scan-result" id="scanResult">
        <div class="scan-result-label">Code detecte</div>
        <div class="scan-result-code" id="scanCode"></div>
      </div>
    </div>

    <!-- Bandeau multi-colis (toujours dans la page, jamais de popup) -->
    <div class="scan-next-banner" id="scanNextBanner">
      <div class="scan-next-label">Colis enregistre</div>
      <div class="scan-next-name">Autre colis pour <span id="scanNextName" style="color:var(--gold)"></span>&nbsp;?</div>
      <div class="scan-next-btns">
        <button class="btn btn-primary btn-sm" id="btnScanNext">Scanner suivant</button>
        <button class="btn btn-secondary btn-sm" id="btnDone">Terminer</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">N Tracking *</label>
      <input class="form-input" id="f-tracking" type="text" placeholder="1Z999AA10123456784" autocomplete="off" />
    </div>

    <div class="form-group">
      <label class="form-label">Transporteur *</label>
      <select class="form-select" id="f-carrier">
        <option value="">-- Selectionner --</option>
        <option>DHL</option>
        <option>FedEx</option>
        <option>UPS</option>
        <option>Chronopost</option>
        <option>Colissimo</option>
        <option>TNT</option>
        <option>Autre</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Destinataire *</label>
      <div class="autocomplete-wrap">
        <input class="form-input" id="f-employee" type="text" placeholder="Nom ou departement..." autocomplete="off" />
        <div class="autocomplete-list" id="acList"></div>
      </div>
    </div>

    <input type="hidden" id="f-email" />
    <input type="hidden" id="f-dept" />
    <input type="hidden" id="f-fullname" />

    <div id="selectedEmployee" style="display:none;margin-bottom:16px">
      <div class="card" style="background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.3);padding:12px 14px">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px">Destinataire selectionne</div>
        <div style="font-weight:600" id="sel-name"></div>
        <div style="font-size:12px;color:var(--text-muted)" id="sel-info"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notes (optionnel)</label>
      <input class="form-input" id="f-notes" type="text" placeholder="Fragile, recommande..." />
    </div>

    <button class="btn btn-primary" id="btnSubmit">Enregistrer le colis</button>
    <button class="btn btn-secondary mt-12" id="btnReset">Reinitialiser</button>
  </div>

  <!-- HISTORIQUE -->
  <div class="tab" id="tab-history">
    <div class="section-title">Historique</div>
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="historySearch" placeholder="Tracking, nom, transporteur..." />
    </div>
    <div class="filter-row" id="filterRow">
      <div class="chip active" data-filter="all">Tous</div>
      <div class="chip" data-filter="Recu">Recus</div>
      <div class="chip" data-filter="Notifie">Notifies</div>
      <div class="chip" data-filter="Remis">Remis</div>
      <div class="chip" data-filter="En attente">En attente</div>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- EMPLOYES -->
  <div class="tab" id="tab-employees">
    <div class="section-title">Annuaire</div>
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="empSearch" placeholder="Nom, departement..." />
    </div>
    <div id="emp-list"></div>
  </div>

</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </button>
  <button class="nav-btn" id="nav-new">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Nouveau
  </button>
  <button class="nav-btn" id="nav-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Historique
  </button>
  <button class="nav-btn" id="nav-employees">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Employes
  </button>
</nav>

<!-- DETAIL -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <div class="detail-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// DONNEES
// =============================================
var EMPLOYEES = [
  { id:1,  nom:"Dupont",   prenom:"Marie",    email:"marie.dupont@ysl.com",    dept:"Direction Generale" },
  { id:2,  nom:"Martin",   prenom:"Pierre",   email:"pierre.martin@ysl.com",   dept:"Finance" },
  { id:3,  nom:"Bernard",  prenom:"Sophie",   email:"sophie.bernard@ysl.com",  dept:"Ressources Humaines" },
  { id:4,  nom:"Petit",    prenom:"Lucas",    email:"lucas.petit@ysl.com",     dept:"Marketing" },
  { id:5,  nom:"Thomas",   prenom:"Emilie",   email:"emilie.thomas@ysl.com",   dept:"Design" },
  { id:6,  nom:"Robert",   prenom:"Antoine",  email:"antoine.robert@ysl.com",  dept:"IT" },
  { id:7,  nom:"Richard",  prenom:"Camille",  email:"camille.richard@ysl.com", dept:"Commercial" },
  { id:8,  nom:"Durand",   prenom:"Hugo",     email:"hugo.durand@ysl.com",     dept:"Logistique" },
  { id:9,  nom:"Moreau",   prenom:"Lea",      email:"lea.moreau@ysl.com",      dept:"Juridique" },
  { id:10, nom:"Laurent",  prenom:"Theo",     email:"theo.laurent@ysl.com",    dept:"Communication" },
];

var parcels = JSON.parse(localStorage.getItem('ysl_parcels') || '[]');
var selectedEmployee = null;
var currentFilter = 'all';

// =============================================
// SCANNER
// Strategie : le scanner reste actif en permanence dans l'onglet.
// scanPaused=true bloque les detections. On remet false pour relancer.
// destroyScanner() seulement quand on quitte l'onglet.
// =============================================
var scanner = null;
var scannerActive = false;
var scanPaused = false;

document.getElementById('toggleScanBtn').addEventListener('click', function() {
  if (scannerActive) destroyScanner();
  else startScanner();
});

var torchOn = false;

function startScanner() {
  if (scanner) return;
  document.getElementById('reader').innerHTML = '';

  var formats = [
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
  ];

  try {
    scanner = new Html5Qrcode('reader');
  } catch(e) {
    showToast('Erreur initialisation scanner', true);
    return;
  }

  scanner.start(
    { facingMode: 'environment' },
    {
      fps: 15,
      qrbox: { width: 280, height: 130 },
      aspectRatio: 2.2,
      formatsToSupport: formats,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true }
    },
    onScanSuccess,
    function() {}
  ).then(function() {
    scannerActive = true;
    scanPaused = false;
    torchOn = false;
    document.getElementById('scannerDot').classList.add('active');
    document.getElementById('toggleScanBtn').textContent = 'Arreter';
    // Afficher le bouton torche si supporte
    var caps = scanner.getRunningTrackCapabilities ? scanner.getRunningTrackCapabilities() : {};
    if (caps && caps.torch) {
      document.getElementById('torchBtn').style.display = 'inline-block';
    }
  }).catch(function() {
    scanner = null;
    showToast('Camera non disponible - saisie manuelle', true);
  });
}

document.getElementById('torchBtn').addEventListener('click', function() {
  if (!scanner || !scannerActive) return;
  torchOn = !torchOn;
  scanner.applyVideoConstraints({ advanced: [{ torch: torchOn }] })
    .catch(function() { showToast('Torche non disponible', true); torchOn = !torchOn; });
  this.style.background = torchOn ? 'var(--gold)' : '';
  this.style.color = torchOn ? 'var(--black)' : '';
});

function destroyScanner() {
  scannerActive = false;
  scanPaused = false;
  torchOn = false;
  document.getElementById('scannerDot').classList.remove('active');
  document.getElementById('toggleScanBtn').textContent = 'Activer';
  document.getElementById('torchBtn').style.display = 'none';
  document.getElementById('torchBtn').style.background = '';
  document.getElementById('torchBtn').style.color = '';
  if (!scanner) {
    document.getElementById('reader').innerHTML = '';
    return;
  }
  var s = scanner;
  scanner = null;
  s.stop().catch(function(){}).then(function() {
    try { s.clear(); } catch(e) {}
    document.getElementById('reader').innerHTML = '';
  });
}

function onScanSuccess(code) {
  if (scanPaused) return;       // ignorer si on attend une action
  scanPaused = true;            // bloquer les detections suivantes

  navigator.vibrate && navigator.vibrate(80);
  document.getElementById('f-tracking').value = code;
  document.getElementById('scanCode').textContent = code;
  document.getElementById('scanResult').classList.add('show');
  autoDetectCarrier(code);
  showToast('Code scanne !');
  // La camera reste active, scanPaused=true la bloque
}

// Remettre scanPaused=false sans redemarrer la camera
function resumeScanner() {
  document.getElementById('f-tracking').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('scanResult').classList.remove('show');
  document.getElementById('scanCode').textContent = '';
  document.getElementById('scanNextBanner').classList.remove('show');
  scanPaused = false;
  showToast('Pret - scanner le colis suivant');
}

function autoDetectCarrier(code) {
  var sel = document.getElementById('f-carrier');
  if (sel.value) return;
  var c = code.toUpperCase().replace(/\s/g, '');
  // UPS : commence par 1Z
  if (/^1Z/.test(c))                       { sel.value = 'UPS'; return; }
  // DHL
  if (/^(JJD|JWT|GM|GW)/.test(c))         { sel.value = 'DHL'; return; }
  // FedEx : prefixes GS1-128 connus
  if (/^(8701|9612|9622|9261|9400|9274|9205|9202|7489|6129|9361|9349)/.test(c)) { sel.value = 'FedEx'; return; }
  if (/^\d{12}$/.test(c))                  { sel.value = 'FedEx'; return; }
  if (/^\d{15}$/.test(c))                  { sel.value = 'FedEx'; return; }
  // Colissimo
  if (/^(JD|LY|RR|CP|8R)\d/.test(c))     { sel.value = 'Colissimo'; return; }
  if (/^\d{13}$/.test(c))                  { sel.value = 'Colissimo'; return; }
  // Chronopost
  if (/^(CX|XD|AT|6V|AR)\d/.test(c))     { sel.value = 'Chronopost'; return; }
  // TNT
  if (/^(GE|GK|GT)\d/.test(c))           { sel.value = 'TNT'; return; }
}

// =============================================
// NAVIGATION
// =============================================
document.querySelectorAll('.nav-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    goTab(this.id.replace('nav-', ''));
  });
});

function goTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name !== 'new' && scannerActive) destroyScanner();
  if (name === 'home')      { updateStats(); renderRecent(); }
  if (name === 'history')   renderHistory();
  if (name === 'employees') renderEmployees();
}

// =============================================
// AUTOCOMPLETE
// =============================================
document.getElementById('f-employee').addEventListener('input', function() {
  var val = this.value;
  selectedEmployee = null;
  document.getElementById('f-email').value = '';
  document.getElementById('f-dept').value = '';
  document.getElementById('f-fullname').value = '';
  document.getElementById('selectedEmployee').style.display = 'none';

  var list = document.getElementById('acList');
  if (val.length < 2) { list.classList.remove('open'); return; }

  var q = val.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  var matches = EMPLOYEES.filter(function(e) {
    var full = (e.prenom + ' ' + e.nom + ' ' + e.dept).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    return full.includes(q);
  }).slice(0, 6);

  if (!matches.length) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map(function(e) {
    return '<div class="autocomplete-item" data-id="' + e.id + '">' +
      '<div class="ac-name">' + e.prenom + ' ' + e.nom + '</div>' +
      '<div class="ac-dept">' + e.dept + '</div></div>';
  }).join('');
  list.classList.add('open');

  list.querySelectorAll('.autocomplete-item').forEach(function(item) {
    item.addEventListener('click', function() {
      var id = parseInt(this.dataset.id);
      var e = EMPLOYEES.find(function(x) { return x.id === id; });
      if (!e) return;
      selectedEmployee = e;
      document.getElementById('f-employee').value = e.prenom + ' ' + e.nom;
      document.getElementById('f-email').value = e.email;
      document.getElementById('f-dept').value = e.dept;
      document.getElementById('f-fullname').value = e.prenom + ' ' + e.nom;
      document.getElementById('acList').classList.remove('open');
      document.getElementById('sel-name').textContent = e.prenom + ' ' + e.nom;
      document.getElementById('sel-info').textContent = e.dept + ' - ' + e.email;
      document.getElementById('selectedEmployee').style.display = 'block';
    });
  });
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.getElementById('acList').classList.remove('open');
  }
});

// =============================================
// SUBMIT
// =============================================
document.getElementById('btnSubmit').addEventListener('click', function() {
  var tracking = document.getElementById('f-tracking').value.trim();
  var carrier  = document.getElementById('f-carrier').value;
  var email    = document.getElementById('f-email').value;
  var fullname = document.getElementById('f-fullname').value;
  var dept     = document.getElementById('f-dept').value;
  var notes    = document.getElementById('f-notes').value.trim();

  if (!tracking) { showToast('N tracking requis', true); return; }
  if (!carrier)  { showToast('Transporteur requis', true); return; }
  if (!email)    { showToast('Selectionner un destinataire', true); return; }

  var parcel = {
    id: Date.now(),
    tracking: tracking, carrier: carrier, email: email,
    fullname: fullname, dept: dept, notes: notes,
    status: 'Recu',
    dateReception: new Date().toISOString(),
    dateRemise: null
  };

  parcels.unshift(parcel);
  saveParcels();
  updateStats();

  // Vider seulement tracking + notes, garder destinataire + transporteur
  document.getElementById('f-tracking').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('scanResult').classList.remove('show');
  document.getElementById('scanCode').textContent = '';

  // Afficher bandeau de choix (toujours inline, jamais de popup)
  document.getElementById('scanNextName').textContent = fullname;
  document.getElementById('scanNextBanner').classList.add('show');

  // Le scanner est toujours actif mais bloque par scanPaused=true
  scanPaused = true;

  showToast('Colis enregistre !');

  // Scroll vers le haut pour voir le bandeau
  document.getElementById('tab-new').scrollTop = 0;
});

document.getElementById('btnScanNext').addEventListener('click', function() {
  resumeScanner();
});

document.getElementById('btnDone').addEventListener('click', function() {
  document.getElementById('scanNextBanner').classList.remove('show');
  resetForm();
  goTab('home');
});

document.getElementById('btnReset').addEventListener('click', resetForm);

function resetForm() {
  document.getElementById('f-tracking').value = '';
  document.getElementById('f-carrier').value = '';
  document.getElementById('f-employee').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-dept').value = '';
  document.getElementById('f-fullname').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('selectedEmployee').style.display = 'none';
  document.getElementById('scanResult').classList.remove('show');
  document.getElementById('scanCode').textContent = '';
  document.getElementById('scanNextBanner').classList.remove('show');
  selectedEmployee = null;
  if (scannerActive) destroyScanner();
}

// =============================================
// STATS
// =============================================
function updateStats() {
  var today = new Date().toDateString();
  document.getElementById('stat-today').textContent   = parcels.filter(function(p) { return new Date(p.dateReception).toDateString() === today; }).length;
  document.getElementById('stat-pending').textContent = parcels.filter(function(p) { return p.status === 'Recu' || p.status === 'En attente'; }).length;
  document.getElementById('stat-notifie').textContent = parcels.filter(function(p) { return p.status === 'Notifie'; }).length;
  document.getElementById('stat-remis').textContent   = parcels.filter(function(p) { return p.status === 'Remis'; }).length;
}

// =============================================
// RENDER
// =============================================
function parcelCard(p) {
  var d = new Date(p.dateReception);
  var ds = d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' }) + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  var bc = { 'Recu':'badge-recu', 'Notifie':'badge-notifie', 'Remis':'badge-remis', 'En attente':'badge-attente' }[p.status] || 'badge-recu';
  return '<div class="card" data-id="' + p.id + '" style="cursor:pointer">' +
    '<div class="card-header">' +
    '<div><span class="carrier">' + p.carrier + '</span><span class="card-meta" style="margin-left:8px">' + ds + '</span></div>' +
    '<span class="badge ' + bc + '">' + p.status + '</span></div>' +
    '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + p.fullname + '</div>' +
    '<div style="font-size:12px;color:var(--text-muted)">' + p.dept + ' - ' + p.tracking + '</div></div>';
}

function bindCards(el) {
  el.querySelectorAll('.card[data-id]').forEach(function(c) {
    c.addEventListener('click', function() { openDetail(parseInt(this.dataset.id)); });
  });
}

function renderRecent() {
  var el = document.getElementById('recent-list');
  var r = parcels.slice(0, 5);
  if (!r.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">&#128230;</div><div>Aucun colis enregistre</div></div>'; return; }
  el.innerHTML = r.map(parcelCard).join('');
  bindCards(el);
}

document.getElementById('historySearch').addEventListener('input', renderHistory);

document.getElementById('filterRow').querySelectorAll('.chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    currentFilter = this.dataset.filter;
    document.getElementById('filterRow').querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
    this.classList.add('active');
    renderHistory();
  });
});

function renderHistory() {
  var q = document.getElementById('historySearch').value.toLowerCase();
  var el = document.getElementById('history-list');
  var list = parcels.slice();
  if (currentFilter !== 'all') list = list.filter(function(p) { return p.status === currentFilter; });
  if (q) list = list.filter(function(p) {
    return p.tracking.toLowerCase().includes(q) || p.fullname.toLowerCase().includes(q) ||
           p.carrier.toLowerCase().includes(q) || (p.dept||'').toLowerCase().includes(q);
  });
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">&#128269;</div><div>Aucun resultat</div></div>'; return; }
  el.innerHTML = list.map(parcelCard).join('');
  bindCards(el);
}

document.getElementById('empSearch').addEventListener('input', renderEmployees);

function renderEmployees() {
  var q = document.getElementById('empSearch').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  var el = document.getElementById('emp-list');
  var list = EMPLOYEES.filter(function(e) {
    var s = (e.prenom + ' ' + e.nom + ' ' + e.dept).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    return !q || s.includes(q);
  });
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">&#128100;</div><div>Aucun employe</div></div>'; return; }
  el.innerHTML = list.map(function(e) {
    return '<div class="card"><div class="card-header">' +
      '<div><div class="card-title">' + e.prenom + ' ' + e.nom + '</div><div class="card-meta">' + e.dept + '</div></div>' +
      '<div style="font-size:12px;color:var(--text-muted)">' + e.email + '</div></div></div>';
  }).join('');
}

// =============================================
// DETAIL PANEL
// =============================================
document.getElementById('detailOverlay').addEventListener('click', function(ev) {
  if (ev.target === this) closeDetail();
});

function openDetail(id) {
  var p = parcels.find(function(x) { return x.id === id; });
  if (!p) return;
  var d = new Date(p.dateReception);
  var ds = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  var ts = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  var mailto = buildMailto(p);
  var bc = { 'Recu':'badge-recu', 'Notifie':'badge-notifie', 'Remis':'badge-remis', 'En attente':'badge-attente' }[p.status] || 'badge-recu';

  var html =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
      '<div>' +
        '<div style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold)">' + p.carrier + '</div>' +
        '<span class="badge ' + bc + '">' + p.status + '</span>' +
      '</div>' +
      '<button id="btnClose" style="background:var(--grey2);border:none;color:var(--text-muted);width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;line-height:1">x</button>' +
    '</div>' +
    '<div class="detail-row"><span class="detail-key">Destinataire</span><span class="detail-val">' + p.fullname + '</span></div>' +
    '<div class="detail-row"><span class="detail-key">Departement</span><span class="detail-val">' + p.dept + '</span></div>' +
    '<div class="detail-row"><span class="detail-key">Email</span><span class="detail-val" style="font-size:12px">' + p.email + '</span></div>' +
    '<div class="detail-row"><span class="detail-key">Tracking</span><span class="detail-val">' + p.tracking + '</span></div>' +
    '<div class="detail-row"><span class="detail-key">Reception</span><span class="detail-val">' + ds + ' a ' + ts + '</span></div>' +
    (p.notes ? '<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">' + p.notes + '</span></div>' : '') +
    '<div class="divider"></div>' +
    '<a href="' + mailto + '" id="btnNotify" class="btn btn-notify">Notifier par email (Outlook)</a>' +
    (p.status !== 'Remis' ? '<button id="btnRemis" class="btn btn-secondary mt-10">Marquer comme remis</button>' : '') +
    '<button id="btnDelete" class="btn btn-danger mt-10">Supprimer</button>';

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');

  document.getElementById('btnClose').addEventListener('click', closeDetail);
  document.getElementById('btnNotify').addEventListener('click', function() { markNotified(id); });
  var br = document.getElementById('btnRemis');
  if (br) br.addEventListener('click', function() { markRemis(id); });
  document.getElementById('btnDelete').addEventListener('click', function() { deleteParcel(id); });
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  renderRecent(); renderHistory(); updateStats();
}

// =============================================
// ACTIONS
// =============================================
function buildMailto(p) {
  var d = new Date(p.dateReception);
  var ds = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  var ts = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  var subject = encodeURIComponent('Colis ' + p.carrier + ' en attente de retrait - Service Courrier');
  var body = encodeURIComponent(
    'Bonjour ' + p.fullname + ',\n\n' +
    'Un colis vous est parvenu au Service Courrier.\n\n' +
    'Transporteur : ' + p.carrier + '\n' +
    'N de tracking : ' + p.tracking + '\n' +
    'Recu le : ' + ds + ' a ' + ts + '\n' +
    (p.notes ? 'Notes : ' + p.notes + '\n' : '') +
    '\nMerci de venir le recuperer des que possible.\n\n' +
    'Cordialement,\nService Courrier - Saint Laurent'
  );
  return 'mailto:' + p.email + '?subject=' + subject + '&body=' + body;
}

function markNotified(id) {
  var p = parcels.find(function(x) { return x.id === id; });
  if (p) { p.status = 'Notifie'; saveParcels(); }
  closeDetail();
  showToast('Notification envoyee');
}

function markRemis(id) {
  var p = parcels.find(function(x) { return x.id === id; });
  if (p) { p.status = 'Remis'; p.dateRemise = new Date().toISOString(); saveParcels(); }
  closeDetail();
  showToast('Colis marque remis');
}

function deleteParcel(id) {
  if (!confirm('Supprimer ce colis ?')) return;
  parcels = parcels.filter(function(x) { return x.id !== id; });
  saveParcels();
  closeDetail();
  showToast('Colis supprime');
}

// =============================================
// UTILITAIRES
// =============================================
function saveParcels() { localStorage.setItem('ysl_parcels', JSON.stringify(parcels)); }

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

function updateHeaderDate() {
  var now = new Date();
  document.getElementById('headerDate').innerHTML =
    now.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short' }) + '<br>' +
    now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

// =============================================
// INIT
// =============================================
updateHeaderDate();
setInterval(updateHeaderDate, 60000);
updateStats();
renderRecent();
renderHistory();
renderEmployees();
</script>

  });
